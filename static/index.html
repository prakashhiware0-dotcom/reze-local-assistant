<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reze</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <div class="window">

    <!-- Title bar -->
    <div class="titlebar">
      <div class="dots"><span></span><span></span><span></span></div>
      <div class="titlebar-text">Reze</div>
      <div class="titlebar-spacer"></div>
    </div>

    <!-- App header -->
    <header class="appbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">Reze</span>
      </div>
      <div class="conn" id="connStatus" data-state="connecting">
        <span class="conn-dot"></span>
        <span class="conn-label"></span>
      </div>
    </header>

    <!-- Chat panel -->
    <main class="panel">

      <div class="avatar-zone">
        <div class="avatar" id="avatar">
          <svg class="avatar-ring" viewBox="0 0 100 100" aria-hidden="true">
            <circle cx="50" cy="50" r="47" />
          </svg>
          <div class="avatar-face" aria-hidden="true">
            <svg viewBox="0 0 64 64" width="40" height="40">
              <circle cx="32" cy="24" r="12" fill="currentColor" opacity="0.9"/>
              <path d="M10 56c0-13 9.8-22 22-22s22 9 22 22" fill="currentColor" opacity="0.9"/>
            </svg>
          </div>
        </div>

        <div class="listening-row" id="listeningRow">
          <div class="bars" id="bars"></div>
          <span class="status-label" id="statusText">Tap to speak</span>
        </div>
      </div>

      <div class="thread" id="thread"></div>

    </main>

    <!-- Input dock -->
    <footer class="dock">
      <button class="mic-btn" id="micBtn" aria-label="Tap to speak" data-active="false">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 14.5a3.5 3.5 0 0 0 3.5-3.5V6a3.5 3.5 0 0 0-7 0v5a3.5 3.5 0 0 0 3.5 3.5Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M6.5 11a5.5 5.5 0 0 0 11 0M12 17.5V20.5M9.5 20.5h5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <input
        type="text"
        id="textInput"
        class="text-input"
        placeholder="Type your message…"
        autocomplete="off"
      />

      <button class="send-btn" id="sendBtn">
        <span>Send</span>
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </footer>

  </div>

  <audio id="ttsAudio" hidden></audio>

  <script src="/static/app.js"></script>
</body>
</html>
